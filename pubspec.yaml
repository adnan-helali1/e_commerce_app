name: B2B
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

# ---------------- DEPENDENCIES ----------------
dependencies:
  flutter:
    sdk: flutter

  # Networking
  dio: ^5.9.2
  retrofit: ^4.8.0
  pretty_dio_logger: ^1.4.0

  # JSON serialization
  json_annotation: ^4.11.0

  # UI helpers
  flutter_screenutil: ^5.9.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # State management
  bloc: ^9.2.0

  # UI
  cupertino_icons: ^1.0.8
  flutter_native_splash: ^2.4.7

  # Code generation
  freezed_annotation: ^3.1.0

# ---------------- DEV DEPENDENCIES ----------------
dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code generators (COMPATIBLE SET)
  build_runner: ^2.4.13
  retrofit_generator: ^10.2.6
  json_serializable: ^6.7.1
  freezed: ^3.2.5

  flutter_launcher_icons: ^0.13.1

# ---------------- FLUTTER CONFIG ----------------
flutter:
  uses-material-design: true

  assets:
    - assets/images/

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-semiBold.ttf
          weight: 600
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700

# ---------------- ICONS ----------------
flutter_launcher_icons:
  android: true
  image_path: "assets/images/bicon.png"
  adaptive_icon_background: "assets/images/icon.png"
  adaptive_icon_foreground: "assets/images/bicon.png"