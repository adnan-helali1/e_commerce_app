name: e_commerce_app
description: "A new Flutter project."

publish_to: 'none' # Remove this line if you wish to publish to pub.dev


version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

#A flutter plugin for adapting screen and font size.Guaranteed to look good on different models    
  flutter_screenutil: ^5.9.3

  # state management library
  bloc: ^9.2.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter

 
  flutter_lints: ^6.0.0


flutter:
  uses-material-design: true
    
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/cairo/Cairo-Light.ttf
          weight: 300
        - asset: assets/fonts/cairo/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/cairo/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/cairo/Cairo-semiBold.ttf
          weight: 600          
        - asset: assets/fonts/cairo/Cairo-Bold.ttf
          weight: 700
